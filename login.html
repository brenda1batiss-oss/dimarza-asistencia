<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D0D0D">
<title>Dimarza — Ingreso</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--coal:#0D0D0D;--plate:#1C1C1C;--steel:#2A2A2A;--ore:#CC1010;--ore-dim:#991010;--ice:#D8D8D8;--fog:#888;--signal:#00C97A;--r:6px}
html,body{height:100%;background:radial-gradient(ellipse at 30% 20%,#2a0808 0%,var(--coal) 65%);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;color:var(--ice)}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:0}
.container{position:relative;z-index:1;width:100%;max-width:360px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:0}
.logo-wrap{text-align:center;margin-bottom:28px}
.logo-img{width:100px;height:100px;object-fit:contain;filter:drop-shadow(0 0 20px rgba(204,16,16,0.5))}
.subtitle{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--fog);text-transform:uppercase;margin-top:8px}
.mine-name{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--ore);margin-top:4px}
.card{width:100%;background:var(--plate);border:1px solid var(--steel);border-radius:10px;padding:28px 24px;display:flex;flex-direction:column;gap:18px}
.error-box{background:rgba(204,16,16,0.12);border:1px solid rgba(204,16,16,0.5);border-radius:var(--r);padding:12px 16px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--ore);display:none}
.error-box.show{display:block}
.field{display:flex;flex-direction:column;gap:6px}
.label{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--fog);text-transform:uppercase}
.input{background:var(--steel);border:1px solid rgba(255,255,255,0.08);border-radius:var(--r);padding:14px 16px;color:var(--ice);font-size:16px;font-family:'Share Tech Mono',monospace;outline:none;transition:border-color 200ms;width:100%;letter-spacing:2px}
.input:focus{border-color:var(--ore)}
.btn{background:var(--ore);border:none;border-radius:var(--r);padding:16px;color:white;font-size:16px;font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:3px;cursor:pointer;transition:background 200ms;width:100%}
.btn:active{background:var(--ore-dim)}
.btn:disabled{background:var(--steel);color:var(--fog);cursor:not-allowed}
.spinner{display:none;text-align:center;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--fog);letter-spacing:2px}
.spinner.show{display:block}
</style>
</head>

    <div class="subtitle">Control de Asistencia Minera</div>
    <div class="mine-name">▸ ANGLOAMERICAN QUELLAVECO ◂</div>
  </div>
  <div class="card">
    <div class="error-box" id="errBox">DNI o PIN incorrecto. Verifique e intente nuevamente.</div>
    <div class="field">
      <label class="label">DNI del Supervisor</label>
      <input class="input" id="dniField" type="text" inputmode="numeric" maxlength="8" placeholder="12345678" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="field">
      <label class="label">PIN de Acceso</label>
      <input class="input" id="pinField" type="password" inputmode="numeric" maxlength="6" placeholder="••••" autocomplete="off">
    </div>
    <button class="btn" id="btnLogin" onclick="intentarLogin()">INGRESAR</button>
    <div class="spinner" id="spinner">VERIFICANDO...</div>
  </div>
</div>
<script>
// ── Constantes compartidas con app.html ──
const DB_SUPERVISORES = 'db_supervisores';
const DB_PERSONAL     = 'db_personal';
const DB_REGISTROS    = 'db_registros';
const SESSION_KEY     = 'dmz_session';

const SEED_SUPERVISORES = [
  { dni:'00000001', nombre:'Administrador Dimarza', pin:'1234', rol:'Administrador', activo:true },
  { dni:'00000002', nombre:'Supervisor Demo',       pin:'2222', rol:'Supervisor',    activo:true },
];
const SEED_PERSONAL = [
  { dni:'74225809', nombres:'Juan Carlos', apellidos:'Torres Ccama', cargo:'Gerencia General', empresa:'DIMARZA SAC', unidad:'UM-QUE', estado:'Activo' },
  { dni:'12345678', nombres:'Alejandro',   apellidos:'García Quispe', cargo:'Operador de Perforadora', empresa:'DIMARZA SAC', unidad:'UM-QUE', estado:'Activo' },
];

// ── Inicializar DB si está vacía o en formato viejo ──
function initDB() {
  const raw = localStorage.getItem(DB_SUPERVISORES);
  let sups = [];
  try { sups = JSON.parse(raw || '[]'); } catch(e) { sups = []; }
  // Resetear si formato viejo (tiene email) o vacío
  if (!sups.length || sups[0].email !== undefined) {
    localStorage.setItem(DB_SUPERVISORES, JSON.stringify(SEED_SUPERVISORES));
  } else {
    // Normalizar todos los valores a string
    const norm = sups.map(s => ({
      ...s,
      dni: String(s.dni || '').trim(),
      pin: String(s.pin || '').trim(),
      activo: s.activo !== false
    }));
    localStorage.setItem(DB_SUPERVISORES, JSON.stringify(norm));
  }
  if (!localStorage.getItem(DB_PERSONAL))  localStorage.setItem(DB_PERSONAL,  JSON.stringify(SEED_PERSONAL));
  if (!localStorage.getItem(DB_REGISTROS)) localStorage.setItem(DB_REGISTROS, JSON.stringify([]));
}

// ── Si ya hay sesión activa → redirigir ──
function checkSession() {
  try {
    const s = JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null');
    if (s && s.dni && s.pin) {
      // Verificar que aún existe el usuario con ese pin
      const sups = JSON.parse(localStorage.getItem(DB_SUPERVISORES) || '[]');
      const ok = sups.find(u => String(u.dni).trim()===s.dni && String(u.pin).trim()===s.pin);
      if (ok) { window.location.href = 'app.html'; return; }
    }
  } catch(e) {}
  sessionStorage.removeItem(SESSION_KEY);
}

function mostrarError(msg) {
  const el = document.getElementById('errBox');
  el.textContent = msg || 'DNI o PIN incorrecto.';
  el.classList.add('show');
  document.getElementById('pinField').value = '';
  document.getElementById('pinField').focus();
}

function intentarLogin() {
  document.getElementById('errBox').classList.remove('show');
  const dni = String(document.getElementById('dniField').value || '').trim().replace(/\D/g,'');
  const pin = String(document.getElementById('pinField').value || '').trim();

  if (!dni) { mostrarError('Ingrese su DNI.'); return; }
  if (!pin) { mostrarError('Ingrese su PIN.'); return; }
  if (dni.length < 7) { mostrarError('DNI debe tener al menos 7 dígitos.'); return; }
  if (pin.length < 4) { mostrarError('PIN debe tener al menos 4 dígitos.'); return; }

  document.getElementById('btnLogin').disabled = true;
  document.getElementById('spinner').classList.add('show');

  // Pequeño delay para que se vea el spinner y el teclado se cierre
  setTimeout(() => {
    try {
      const sups = JSON.parse(localStorage.getItem(DB_SUPERVISORES) || '[]');
      const user = sups.find(s =>
        String(s.dni || '').trim() === dni &&
        String(s.pin || '').trim() === pin &&
        s.activo !== false
      );
      if (!user) {
        document.getElementById('btnLogin').disabled = false;
        document.getElementById('spinner').classList.remove('show');
        mostrarError('DNI o PIN incorrecto. Verifique e intente nuevamente.');
        return;
      }
      // Guardar sesión
      sessionStorage.setItem(SESSION_KEY, JSON.stringify({ dni: user.dni, pin: user.pin, rol: user.rol, nombre: user.nombre }));
      window.location.href = 'app.html';
    } catch(err) {
      document.getElementById('btnLogin').disabled = false;
      document.getElementById('spinner').classList.remove('show');
      mostrarError('Error interno. Recargue la página.');
      console.error(err);
    }
  }, 300);
}

// Enter en PIN → login
document.getElementById('pinField').addEventListener('keydown', e => { if (e.key==='Enter') intentarLogin(); });
document.getElementById('dniField').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('pinField').focus(); });

// ── Inicio ──
initDB();
checkSession();
</script>
</body>
</html>
